name: terraform-plan

on:
  pull_request:
    paths:
      - "infra/terraform/**"

jobs:
  plan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
      - name: Terraform fmt check
        run: terraform -chdir=infra/terraform/live/personal fmt -check -recursive
      - name: Terraform init (no backend)
        run: terraform -chdir=infra/terraform/live/personal init -backend=false
      - name: Terraform validate
        run: terraform -chdir=infra/terraform/live/personal validate
